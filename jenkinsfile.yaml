pipeline {
    agent any

    tools {
        maven 'MAVEN_3.6.3'
        jdk 'JDK17'
    }

    environment {
        IMAGE_NAME = "Prod-automation-app"
        IMAGE_TAG = "${BUILD_NUMBER}"
    }

    stages {

        stage('Checkout Code') {
            steps {
                // Jenkins will take repo from "Pipeline from SCM"
                checkout scm
            }
        }

        stage('Check Tools') {
            steps {
                sh 'java -version'
                sh 'mvn -version'
            }
        }

        stage('Maven Build') {
            steps {
                sh 'mvn clean install'
            }
        }

        stage('Run Tests') {
            steps {
                sh 'mvn test'
            }
        }

        stage('Build Docker Image') {
            steps {
                sh "docker build -t ${IMAGE_NAME}:${IMAGE_TAG} ."
            }
        }

    }

    post {
        success {
            echo "✅ Build Successful - Image Created"
        }

        failure {
            echo "❌ Build Failed"
        }

        always {
            cleanWs()
        }
    }
}
