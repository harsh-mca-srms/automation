pipeline {
    agent any

    tools {
        maven 'MAVEN_3.6.3'
        jdk 'JDK17'
    }

    environment {
        IMAGE_NAME = "prod-automation-app"
        IMAGE_TAG  = "${BUILD_NUMBER}"
    }

    stages {

        stage('Checkout Code') {
            steps {
                checkout scm
            }
        }

        stage('Check Tools') {
            steps {
                sh 'java -version'
                sh 'mvn -version'
            }
        }

        stage('Maven Build') {
            steps {
                sh 'mvn clean install'
            }
        }

        stage('Run Tests') {
            steps {
                sh 'mvn test'
            }
        }

        stage('Build Docker Image') {
            steps {
                sh '''
                    docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .
                '''
            }
        }

        stage('Save Docker Image') {
            steps {
                sh '''
                    mkdir -p /opt/images
                    docker save -o /opt/images/${IMAGE_NAME}-${IMAGE_TAG}.tar ${IMAGE_NAME}:${IMAGE_TAG}
                    ls -lh /opt/images
                '''
            }
        }
    }

    post {
        success {
            echo "✅ Build Successful"
        }

        failure {
            echo "❌ Build Failed"
        }

        always {
            cleanWs()
        }
    }
}
